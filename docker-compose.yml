# AI-Nexus 本地一键部署（前后端分离 + C++ 核心服务）
#
# 用法：
#   1) 安装 Docker 与 Docker Compose（https://docs.docker.com/compose/install/）
#   2)（可选）在下方 backend.environment 填入 LLM_API_KEY / EMBED_API_KEY 以启用真实对话
#   3) docker compose up --build
#   4) 浏览器打开 http://localhost:8080
#
# 三个服务在同一 bridge 网络 ai-nexus 内互通：
#   frontend(nginx:80) -> gateway(php:8000) -> backend(cpp:8080)

services:
  backend:
    build: ./backend
    environment:
      SERVER_PORT: "8080"
      BACKEND_TOKEN: "dev-backend-token"
      # 可选：启用真实 LLM / Embedding（不填则仅健康检查与规则型 NLP 可用）
      # LLM_API_KEY: "sk-..."
      # LLM_BASE_URL: "https://api.openai.com/v1"
      # LLM_MODEL: "gpt-4o-mini"
      # EMBED_API_KEY: "sk-..."
      # EMBED_MODEL: "text-embedding-3-small"
    expose:
      - "8080"
    restart: unless-stopped
    networks: [ai-nexus]

  gateway:
    build: ./gateway
    environment:
      BACKEND_BASE: "http://backend:8080"
      BACKEND_TOKEN: "dev-backend-token"
      REQUIRE_LOGIN: "false"
      APP_ENV: "production"
    expose:
      - "8000"
    depends_on: [backend]
    restart: unless-stopped
    networks: [ai-nexus]

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on: [gateway]
    restart: unless-stopped
    networks: [ai-nexus]

networks:
  ai-nexus:
    driver: bridge
